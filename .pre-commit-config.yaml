repos:
  - hooks:
      - id: commitizen
      - id: commitizen-branch
        stages:
          - pre-push
    repo: https://github.com/commitizen-tools/commitizen
    rev: 2a4ac6555711923a159f74cd3a324c785ac8f145  # frozen: v4.16.3

  # - hooks:
  #     - id: uv-lock
  #   repo: https://github.com/astral-sh/uv-pre-commit
  #   rev: 9eb8a5492241b44a52c8a0c9612cd46cbc69fb01  # frozen: 0.8.4

  - hooks:
      - id: mypy
        exclude: "^(docs/_includes)"
        additional_dependencies:
          - types-PyYAML
    repo: https://github.com/pre-commit/mirrors-mypy
    rev: d2823d321df3af8f878f7ee3414dc94d037145b9  # frozen: v2.1.0

  - hooks:
      - id: ruff
        args: [--fix]
        exclude: "^(docs/_includes)"
      - id: ruff-format
    repo: https://github.com/astral-sh/ruff-pre-commit
    rev: 77039ccbba72c8aede339c5f8ae29b42aced0a2e  # frozen: v0.15.18

  - hooks:
      - id: mdformat
        exclude: "^(.github/|CHANGELOG.md|LICENSE.md|docs/CLAUDE.md|docs/reference/api.md)"
        additional_dependencies:
          - mdformat-gfm
          - mdformat-ruff
          - ruff
    repo: https://github.com/executablebooks/mdformat
    rev: 2d496dbc18e31b83a1596685347ffe0b6041daf0 # frozen: 1.0.0

  - hooks:
      - id: codespell
        additional_dependencies:
          - tomli
    repo: https://github.com/codespell-project/codespell
    rev: 2ccb47ff45ad361a21071a7eedda4c37e6ae8c5a  # frozen: v2.4.2

  # - hooks:
  #   - id: shellcheck
  #   repo: https://github.com/shellcheck-py/shellcheck-py
  #   rev: a23f6b85d0fdd5bb9d564e2579e678033debbdff  # frozen: v0.10.0.1

  - hooks:
      - id: check-ast
      - id: check-builtin-literals
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-toml
      - id: check-yaml
      - id: debug-statements
      - id: end-of-file-fixer
      - id: trailing-whitespace
    repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c # frozen: v6.0.0
